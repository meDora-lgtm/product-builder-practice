<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <div class="header-top">
                <h1>행운의 로또 번호</h1>
                <button id="theme-toggle" aria-label="테마 변경">
                    <span class="icon">🌙</span>
                </button>
            </div>
            <p>오늘의 행운을 확인해보세요!</p>
        </header>

        <main>
            <div class="generator-section">
                <div id="numbers-display" class="numbers-container">
                    <!-- 번호가 여기에 생성됩니다 -->
                    <div class="placeholder">번호 추첨 버튼을 눌러주세요</div>
                </div>
                <button id="generate-btn" class="primary-btn">번호 추첨하기</button>
            </div>

            <div class="history-section">
                <h3>최근 추첨 내역</h3>
                <ul id="history-list"></ul>
                <button id="clear-history" class="text-btn">내역 지우기</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 행운 연구소</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
